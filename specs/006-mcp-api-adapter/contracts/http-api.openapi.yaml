openapi: 3.1.0
info:
  title: HKS Local HTTP Adapter
  version: 0.1.0
  description: Optional P2 loopback HTTP facade over the same adapter core as MCP.
servers:
  - url: http://127.0.0.1:8766
paths:
  /query:
    post:
      summary: Query HKS knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksQueryInput'
      responses:
        '200':
          description: Schema-valid HKS QueryResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
  /ingest:
    post:
      summary: Ingest local file or directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksIngestInput'
      responses:
        '200':
          description: Schema-valid HKS ingest response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
  /lint:
    post:
      summary: Run HKS lint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksLintInput'
      responses:
        '200':
          description: Schema-valid HKS lint response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
  /coord/session:
    post:
      summary: Start, heartbeat, or close a coordination session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksCoordSessionInput'
      responses:
        '200':
          description: Schema-valid HKS coordination response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
  /coord/lease:
    post:
      summary: Claim, renew, or release a coordination lease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksCoordLeaseInput'
      responses:
        '200':
          description: Schema-valid HKS coordination response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
  /coord/handoff:
    post:
      summary: Add or list coordination handoff notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksCoordHandoffInput'
      responses:
        '200':
          description: Schema-valid HKS coordination response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
  /coord/status:
    post:
      summary: Read coordination status
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HksCoordStatusInput'
      responses:
        '200':
          description: Schema-valid HKS coordination response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Adapter error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
        '500':
          description: Adapter error envelope for runtime failures
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterError'
components:
  schemas:
    HksQueryInput:
      type: object
      required: [question]
      additionalProperties: false
      properties:
        question:
          type: string
          minLength: 1
        writeback:
          type: string
          enum: [no, auto, yes, ask]
          default: no
        ks_root:
          type: [string, 'null']
    HksIngestInput:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path:
          type: string
          minLength: 1
        prune:
          type: boolean
          default: false
        pptx_notes:
          type: string
          enum: [include, exclude]
          default: include
        ks_root:
          type: [string, 'null']
    HksLintInput:
      type: object
      additionalProperties: false
      properties:
        strict:
          type: boolean
          default: false
        severity_threshold:
          type: string
          enum: [error, warning, info]
          default: error
        fix:
          type: string
          enum: [none, plan, apply]
          default: none
        ks_root:
          type: [string, 'null']
    HksCoordSessionInput:
      type: object
      required: [action, agent_id]
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [start, heartbeat, close]
        agent_id:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[A-Za-z0-9._@-]+$'
        session_id:
          type: [string, 'null']
          minLength: 1
        metadata:
          type: object
          default: {}
        ks_root:
          type: [string, 'null']
    HksCoordLeaseInput:
      type: object
      required: [action, agent_id, resource_key]
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [claim, renew, release]
        agent_id:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[A-Za-z0-9._@-]+$'
        resource_key:
          type: string
          minLength: 1
          maxLength: 240
        session_id:
          type: [string, 'null']
          minLength: 1
        lease_id:
          type: [string, 'null']
          minLength: 1
        ttl_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          default: 1800
        reason:
          type: [string, 'null']
        ks_root:
          type: [string, 'null']
    HksCoordHandoffInput:
      type: object
      required: [action, agent_id]
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [add, list]
        agent_id:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[A-Za-z0-9._@-]+$'
        resource_key:
          type: [string, 'null']
          minLength: 1
          maxLength: 240
        summary:
          type: [string, 'null']
          minLength: 1
        next_action:
          type: [string, 'null']
          minLength: 1
        references:
          type: array
          items:
            type: object
          default: []
        blocked_by:
          type: array
          items:
            type: string
          default: []
        ks_root:
          type: [string, 'null']
    HksCoordStatusInput:
      type: object
      additionalProperties: false
      properties:
        agent_id:
          type: [string, 'null']
          minLength: 1
          maxLength: 80
        resource_key:
          type: [string, 'null']
          minLength: 1
          maxLength: 240
        include_stale:
          type: boolean
          default: true
        ks_root:
          type: [string, 'null']
    QueryResponse:
      type: object
      required: [answer, source, confidence, trace]
      additionalProperties: false
      properties:
        answer:
          type: string
        source:
          type: array
          items:
            type: string
            enum: [wiki, graph, vector]
          uniqueItems: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        trace:
          type: object
          required: [route, steps]
          properties:
            route:
              type: string
              enum: [wiki, graph, vector]
            steps:
              type: array
              items:
                type: object
    AdapterError:
      type: object
      required: [ok, error]
      properties:
        ok:
          const: false
        error:
          type: object
          required: [code, exit_code, message, details]
          properties:
            code:
              type: string
            exit_code:
              type: integer
              enum: [1, 2, 65, 66]
            message:
              type: string
            hint:
              type: [string, 'null']
            details:
              type: array
              items:
                type: string
        response:
          type: [object, 'null']
