openapi: 3.1.0
info:
  title: HKS LLM extraction API
  version: 0.1.0
  description: Loopback-only HTTP facade for 008 LLM classification/extraction.
servers:
  - url: http://127.0.0.1:8766
paths:
  /llm/classify:
    post:
      summary: Classify and extract one ingested HKS source
      operationId: llmClassify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmClassifyRequest"
      responses:
        "200":
          description: HKS top-level response shape with llm_extraction_summary trace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HksResponse"
        "400":
          description: Usage, validation, or provider configuration error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterError"
        "500":
          description: Runtime failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterError"
components:
  schemas:
    LlmClassifyRequest:
      type: object
      required:
        - source_relpath
      additionalProperties: false
      properties:
        source_relpath:
          type: string
          minLength: 1
        mode:
          type: string
          enum: [preview, store]
          default: preview
        provider:
          type: string
          default: fake
        model:
          type:
            - string
            - "null"
          minLength: 1
        prompt_version:
          type:
            - string
            - "null"
          minLength: 1
        force_new_run:
          type: boolean
          default: false
        requested_by:
          type:
            - string
            - "null"
          minLength: 1
    HksResponse:
      type: object
      required: [answer, source, confidence, trace]
      additionalProperties: false
      properties:
        answer:
          type: string
        source:
          type: array
          items:
            type: string
            enum: [wiki, graph, vector]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        trace:
          type: object
          required: [route, steps]
          additionalProperties: false
          properties:
            route:
              type: string
              enum: [wiki, graph, vector]
            steps:
              type: array
              items:
                type: object
                required: [kind, detail]
                additionalProperties: false
                properties:
                  kind:
                    type: string
                  detail:
                    type: object
    AdapterError:
      type: object
      required: [ok, error, response]
      additionalProperties: false
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          required: [code, exit_code, message, details]
          additionalProperties: false
          properties:
            code:
              type: string
            exit_code:
              type: integer
            message:
              type: string
            details:
              type: object
        response:
          type: object
