name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-chi-tra

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/hks

      - name: Test
        run: uv run pytest --cov=hks --cov-fail-under=80 -q

  airgapped-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Warm cache
        run: uv sync

      - name: Recreate venv from local cache only
        run: |
          rm -rf .venv
          uv sync --offline

      - name: Offline office ingest smoke
        run: uv run pytest tests/integration/test_office_pipeline.py -q
